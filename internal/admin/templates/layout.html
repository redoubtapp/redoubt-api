<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{.Title}} - Redoubt Admin</title>
    <link rel="stylesheet" href="/static/pico.min.css">
    <script src="/static/htmx.min.js"></script>
    <style>
        :root {
            --pico-font-size: 15px;
        }
        body {
            margin: 0;
            min-height: 100vh;
        }
        .topbar {
            background: var(--pico-card-background-color);
            border-bottom: 1px solid var(--pico-muted-border-color);
            padding: 0 1.5rem;
            display: flex;
            align-items: center;
            gap: 1.5rem;
            height: 3.25rem;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .topbar .brand {
            font-weight: 700;
            font-size: 1rem;
            margin-right: 0.5rem;
            white-space: nowrap;
            color: var(--pico-color);
            text-decoration: none;
        }
        .topbar .brand span {
            font-weight: 400;
            color: var(--pico-muted-color);
            margin-left: 0.25rem;
        }
        .topbar-nav {
            display: flex;
            gap: 0.25rem;
            list-style: none;
            padding: 0;
            margin: 0;
        }
        .topbar-nav li {
            list-style: none;
            margin: 0;
            padding: 0;
        }
        .topbar-nav a {
            display: block;
            padding: 0.4rem 0.75rem;
            border-radius: 0.375rem;
            text-decoration: none;
            color: var(--pico-color);
            font-size: 0.875rem;
            white-space: nowrap;
        }
        .topbar-nav a:hover {
            background: var(--pico-primary-focus);
        }
        .topbar-nav a.active {
            background: var(--pico-primary-background);
            color: var(--pico-primary-inverse);
        }
        .topbar-right {
            margin-left: auto;
            display: flex;
            align-items: center;
            gap: 0.75rem;
            font-size: 0.85rem;
            white-space: nowrap;
        }
        .topbar-right .user-info {
            color: var(--pico-muted-color);
        }
        .topbar-right form {
            margin: 0;
        }
        .topbar-right button {
            padding: 0.25rem 0.6rem;
            font-size: 0.8rem;
            margin: 0;
        }
        main.content {
            padding: 2rem;
            max-width: 1200px;
            margin: 0 auto;
        }
        .flash {
            padding: 0.75rem 1rem;
            border-radius: 0.375rem;
            background: var(--pico-primary-focus);
            border-left: 4px solid var(--pico-primary);
            margin-bottom: 1.5rem;
            font-size: 0.9rem;
        }
        .stat-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 1rem;
            margin-bottom: 2rem;
        }
        .stat-card {
            background: var(--pico-card-background-color);
            border: 1px solid var(--pico-muted-border-color);
            border-radius: 0.5rem;
            padding: 1.25rem;
            text-align: center;
        }
        .stat-card .stat-value {
            font-size: 2rem;
            font-weight: 700;
            line-height: 1.2;
        }
        .stat-card .stat-label {
            font-size: 0.85rem;
            color: var(--pico-muted-color);
            margin-top: 0.25rem;
        }
        .badge {
            display: inline-block;
            padding: 0.15rem 0.5rem;
            border-radius: 0.25rem;
            font-size: 0.75rem;
            font-weight: 600;
        }
        .badge-green { background: #d1fae5; color: #065f46; }
        .badge-red { background: #fee2e2; color: #991b1b; }
        .badge-yellow { background: #fef3c7; color: #92400e; }
        .badge-blue { background: #dbeafe; color: #1e40af; }
        .badge-gray { background: #f3f4f6; color: #374151; }
        table {
            font-size: 0.9rem;
        }
        .actions {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
        }
        .actions form {
            margin: 0;
        }
        .actions button, .actions .button {
            padding: 0.3rem 0.75rem;
            font-size: 0.8rem;
            margin: 0;
        }
        .pagination {
            display: flex;
            gap: 0.5rem;
            align-items: center;
            justify-content: center;
            margin-top: 1.5rem;
        }
        .pagination a, .pagination span {
            padding: 0.3rem 0.7rem;
            border-radius: 0.25rem;
            text-decoration: none;
            font-size: 0.85rem;
        }
        .pagination .current {
            background: var(--pico-primary-background);
            color: var(--pico-primary-inverse);
        }
        .detail-grid {
            display: grid;
            grid-template-columns: 160px 1fr;
            gap: 0.5rem 1rem;
            margin-bottom: 1.5rem;
        }
        .detail-grid dt {
            font-weight: 600;
            color: var(--pico-muted-color);
            font-size: 0.85rem;
        }
        .detail-grid dd {
            margin: 0;
        }
    </style>
</head>
<body>
    <header class="topbar">
        <a href="/" class="brand">Redoubt <span>Admin</span></a>
        <ul class="topbar-nav">
            <li><a href="/" {{if eq .Nav "dashboard"}}class="active"{{end}}>Dashboard</a></li>
            <li><a href="/users" {{if eq .Nav "users"}}class="active"{{end}}>Users</a></li>
            <li><a href="/spaces" {{if eq .Nav "spaces"}}class="active"{{end}}>Spaces</a></li>
            <li><a href="/audit" {{if eq .Nav "audit"}}class="active"{{end}}>Audit Log</a></li>
        </ul>
        {{if .User}}
        <div class="topbar-right">
            <span class="user-info">{{.User.Username}}</span>
            <form method="POST" action="/logout">
                {{csrfField .CSRFToken}}
                <button type="submit" class="outline secondary">Log out</button>
            </form>
        </div>
        {{end}}
    </header>
    <main class="content">
        {{if .Flash}}<div class="flash">{{.Flash}}</div>{{end}}
        {{template "content" .}}
    </main>
</body>
</html>
