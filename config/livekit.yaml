# LiveKit Server Configuration (Production)
# https://docs.livekit.io/home/self-hosting/deployment/#config
# For development settings, see livekit.dev.yaml

port: 7880

rtc:
  # UDP port range for WebRTC media
  port_range_start: 60000
  port_range_end: 60100
  # TCP fallback for restrictive firewalls
  tcp_port: 7881
  # Auto-detect public IP via STUN for NAT traversal
  use_external_ip: true
  # If use_external_ip doesn't work (e.g. behind certain load balancers),
  # set node_ip to the server's public IP explicitly:
  # node_ip: <your-server-public-ip>

turn:
  # Enable TURN relay for clients behind restrictive firewalls/NATs.
  # This provides UDP relay without TLS. For TLS TURN (port 5349),
  # LiveKit needs its own TLS certs and a dedicated domain — see:
  # https://docs.livekit.io/home/self-hosting/deployment/#turn
  enabled: true
  udp_port: 7882

redis:
  address: redis:6379

# API keys are loaded from LIVEKIT_KEYS environment variable
# Format: key:secret (e.g., LIVEKIT_KEYS=mykey:mysecret)

room:
  # Destroy room immediately when last participant leaves
  empty_timeout: 0
  # No global participant limit (enforced per-channel in application)
  max_participants: 0

logging:
  level: info
  json: true
