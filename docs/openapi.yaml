          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  # Emoji endpoints
  /emoji:
    get:
      tags: [Emoji]
      summary: List curated emoji
      description: Get the curated emoji set for reactions. Grouped by category.
      operationId: listEmoji
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Emoji list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EmojiListResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  # Invite endpoints
  /spaces/{id}/invites:
    get:
      tags: [Invites]
      summary: List invites
      description: List all invites for a space. Requires admin role.
      operationId: listInvites
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            $ref: '#/components/schemas/UUID'
      responses:
        '200':
          description: List of invites
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InvitesListResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

    post:
      tags: [Invites]
      summary: Create invite
      description: Create a new invite code for a space. Requires admin role.
      operationId: createInvite
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            $ref: '#/components/schemas/UUID'
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateInviteRequest'
      responses:
        '201':
          description: Invite created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Invite'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /invites/{code}:
    get:
      tags: [Invites]
      summary: Get invite info
      description: Get public information about an invite code. No authentication required.
      operationId: getInviteInfo
      parameters:
        - name: code
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Invite information
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InviteInfo'
        '404':
          $ref: '#/components/responses/NotFound'

  /invites/{id}:
    delete:
      tags: [Invites]
      summary: Revoke invite
      description: Revoke an invite code. Requires admin role.
      operationId: revokeInvite
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            $ref: '#/components/schemas/UUID'
      responses:
        '200':
          description: Invite revoked
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /invites/{code}/join:
    post:
      tags: [Invites]
      summary: Join via invite
      description: Join a space using an invite code.
      operationId: joinViaInvite
      security:
        - bearerAuth: []
      parameters:
        - name: code
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Joined space
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Space'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  # Health endpoints
  /health:
    get:
      tags: [Health]
      summary: Health check
      description: Detailed health check with component status.
      operationId: health
      responses:
        '200':
          description: System is healthy
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
        '503':
          description: System is unhealthy
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'

  /health/live:
    get:
      tags: [Health]
      summary: Liveness probe
      description: Simple check that the process is running.
      operationId: liveness
      responses:
        '200':
          description: Process is running
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SimpleStatusResponse'

  /health/ready:
    get:
      tags: [Health]
      summary: Readiness probe
      description: Check if the service is ready to accept traffic.
      operationId: readiness
      responses:
        '200':
          description: Service is ready
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SimpleStatusResponse'
        '503':
          description: Service is not ready
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: "not ready"
                  reason:
                    type: string
                    example: "database unavailable"
