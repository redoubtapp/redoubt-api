root = "."
tmp_dir = "tmp"

[build]
cmd = "go build -o ./tmp/redoubt-api ./cmd/redoubt-api"
bin = "./tmp/redoubt-api"
include_ext = ["go", "yaml"]
exclude_dir = ["tmp", "vendor", "docs", "docker", "client"]
delay = 1000

[log]
time = false

[color]
main = "magenta"
watcher = "cyan"
build = "yellow"
runner = "green"

[misc]
clean_on_exit = true
